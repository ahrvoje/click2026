<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Click2026</title>
    <meta name="author" content="Hrvoje Abraham">
    <meta name="description" content="Color clicking puzzle.">

    <!-- OpenGraph data -->
    <meta property="og:title" content="Click2026">
    <meta property="og:description" content="Color clicking puzzle.">

    <link rel="icon" type="image/png" href="images/click2014_favicon.png">
    <link rel="stylesheet" href="css/click2026.css?build=20260714-pairband1">
    <script type="module" src="scripts/main.js?build=20260714-pairband1"></script>
</head>
<body>
<div id="mainDiv">
    <dialog id="settingsDialog" aria-labelledby="settingsTitle">
        <form method="dialog" id="settingsForm">
            <div class="dialogTitle" id="settingsTitle">Settings</div>
            <div class="settingsBody">
                <fieldset class="settingsGroup">
                    <legend>Moves slider</legend>
                    <label class="settingsOption">
                        <input type="checkbox" id="showMovesSlider">
                        Show
                    </label>
                </fieldset>
                <fieldset class="settingsGroup">
                    <legend>Suggested moves</legend>
                    <label class="settingsOption">
                        <input type="radio" name="suggestedMovesMode" value="top5">
                        Top 5
                    </label>
                    <label class="settingsOption">
                        <input type="radio" name="suggestedMovesMode" value="top5-nonzero">
                        Top 5 and first non-zero
                    </label>
                    <label class="settingsOption">
                        <input type="radio" name="suggestedMovesMode" value="all">
                        All
                    </label>
                </fieldset>
            </div>
            <div class="settingsActions">
                <button class="settingsClose" type="submit" value="close">Close</button>
            </div>
        </form>
    </dialog>
    <dialog id="testsDialog">
        <div class="dialogTitle">Tests</div>
        <div class="progressBar">
            <div class="progressShow" id="progressShow"></div>
            <div class="progressCount" id="progressCount">0%</div>
        </div>
        <textarea id="progressReport" readonly></textarea>
        <button class="dialogStop" id="testsStop" type="button">Stop</button>
    </dialog>
    <main id="mainTop">
        <div id="mainLeft">
            <div id="logo"><img id="logoImage" src="images/click2014_favicon.png" alt="">Click2026</div>
            <nav id="gameExamples">
                <button id="example0" class="example" type="button">Example 1</button>
                <button id="example1" class="example" type="button">Example 2</button>
                <button id="example2" class="example" type="button">Example 3</button>
                <button id="runTests" class="example" type="button">Run tests...</button>
            </nav>
        </div>
        <div id="game">
            <div id="gameMain">
                <div id="boardWrap">
                    <div id="boardColLabels" aria-hidden="true"></div>
                    <div id="boardRowLabels" aria-hidden="true"></div>
                    <canvas id="gameCanvas" width="310" height="310" aria-label="Game board"></canvas>
                </div>
                <div id="control">
                    <div id="movesSliderRow" hidden>
                        <input id="movesSlider" type="range" min="0" max="0" value="0" step="1"
                            aria-label="Shown move">
                        <output id="movesSliderOutput" for="movesSlider">0 / 0</output>
                    </div>
                    <div id="startButtonDiv"><button id="startButton" type="button">NEW GAME</button></div>

                    <div class="rowDiv"><div id="rowInnerDiv" class="rowInnerDiv">
                        <div class="leftDiv">Time:</div><div id="timeValue" class="rightDiv timeValue"></div>
                        <div class="leftDiv">Score:</div><div id="scoreValue" class="rightDiv scoreValue"></div>
                        <div class="filler"></div>
                        <div class="leftDiv">Move:</div><div id="moveValue" class="rightDiv moveValue"></div>
                    </div></div>
                    <div id="buttonsContainer">
                        <div class="buttonFillerOut"></div>
                        <button id="backwardButton" class="smallButton" type="button" title="Rewind to start">
                            <img class="icon on" src="images/icon_backward_on.png" alt="">
                            <img class="icon off" src="images/icon_backward_off.png" alt="">
                        </button>
                        <div class="buttonFillerIn"></div>
                        <div class="smallButtonDiv">
                            <button id="autoPlayButton" class="smallButton" type="button" title="Autoplay">
                                <img class="icon on" src="images/icon_play_on.png" alt="">
                                <img class="icon off" src="images/icon_play_off.png" alt="">
                            </button>
                            <button id="autoPauseButton" class="smallButton" type="button" title="Pause" hidden>
                                <img class="icon on" src="images/icon_pause_on.png" alt="">
                                <img class="icon off" src="images/icon_pause_off.png" alt="">
                            </button>
                        </div>
                        <div class="buttonFillerIn"></div>
                        <button id="forwardButton" class="smallButton" type="button" title="Rewind to end">
                            <img class="icon on" src="images/icon_forward_on.png" alt="">
                            <img class="icon off" src="images/icon_forward_off.png" alt="">
                        </button>
                        <div class="buttonFillerIn"></div>
                        <div class="buttonSeparator"></div>
                        <div class="buttonFillerIn"></div>
                        <button id="importButton" class="smallButton" type="button" title="Import game link">
                            <img class="icon on" src="images/icon_import_on.png" alt="">
                            <img class="icon off" src="images/icon_import_off.png" alt="">
                        </button>
                        <div class="buttonFillerIn"></div>
                        <button id="linkButton" class="smallButton" type="button" title="Get game link">
                            <img class="icon on" src="images/icon_link_on.png" alt="">
                            <img class="icon off" src="images/icon_link_off.png" alt="">
                        </button>
                        <div class="buttonFillerIn"></div>
                        <div class="buttonSeparator"></div>
                        <div class="buttonFillerIn"></div>
                        <button id="replayButton" class="smallButton" type="button" title="Replay start position">
                            <img class="icon on" src="images/icon_replay_on.png" alt="">
                            <img class="icon off" src="images/icon_replay_off.png" alt="">
                        </button>
                        <div class="buttonFillerIn"></div>
                        <div class="buttonSeparator"></div>
                        <div class="buttonFillerIn"></div>
                        <button id="engineButton" class="smallButton" type="button" title="Engine analysis">
                            <svg class="icon engineIcon" viewBox="0 0 26 26" width="26" height="26" aria-hidden="true">
                                <circle class="engineDisc" cx="13" cy="13" r="13"/>
                                <g class="engineGlyph">
                                    <path fill-rule="evenodd" d="M8.6 8.6h8.8v8.8H8.6Z M11.2 11.2h3.6v3.6h-3.6Z"/>
                                    <rect x="9.05" y="5.7" width="1.7" height="2.4"/>
                                    <rect x="12.15" y="5.7" width="1.7" height="2.4"/>
                                    <rect x="15.25" y="5.7" width="1.7" height="2.4"/>
                                    <rect x="9.05" y="17.9" width="1.7" height="2.4"/>
                                    <rect x="12.15" y="17.9" width="1.7" height="2.4"/>
                                    <rect x="15.25" y="17.9" width="1.7" height="2.4"/>
                                    <rect x="5.7" y="9.05" width="2.4" height="1.7"/>
                                    <rect x="5.7" y="12.15" width="2.4" height="1.7"/>
                                    <rect x="5.7" y="15.25" width="2.4" height="1.7"/>
                                    <rect x="17.9" y="9.05" width="2.4" height="1.7"/>
                                    <rect x="17.9" y="12.15" width="2.4" height="1.7"/>
                                    <rect x="17.9" y="15.25" width="2.4" height="1.7"/>
                                </g>
                            </svg>
                        </button>
                        <div class="buttonFillerIn"></div>
                        <button id="markersButton" class="smallButton active" type="button" title="Engine move markers on board">
                            <svg class="icon engineIcon" viewBox="0 0 26 26" width="26" height="26" aria-hidden="true">
                                <circle class="engineDisc" cx="13" cy="13" r="13"/>
                                <path class="markerGlyph" d="M 8 8 H 18 V 14.5 H 14.5 V 18 H 8 Z"/>
                            </svg>
                        </button>
                        <div class="buttonFillerOut"></div>
                    </div>
                    <div id="engineSection" hidden>
                        <ol id="engineList"></ol>
                        <div id="engineStatus"></div>
                    </div>
                </div>
            </div>
            <aside id="treePanel" aria-label="Position tree">
                <div id="treeScroll"></div>
            </aside>
        </div>
        <div id="mainRight"></div>
    </main>
    <div id="mainFiller"></div>
    <footer id="footer">
        <div id="leftFooter">
            <button id="settingsButton" type="button">settings</button>
            <label id="testsToggle"><input type="checkbox" id="testsCheckbox"> examples &amp; tests</label>
        </div>
        <div id="rightFooter">
            <div id="copy">Copyright 2014&ndash;2026 &copy; Hrvoje Abraham</div>
            <div id="mail">ahrvoje@gmail.com</div>
        </div>
    </footer>
</div>
</body>
</html>
